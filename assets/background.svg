<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29ABE2;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Grass Gradient -->
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8CC63F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>

    <!-- Glass Bubble Mask/Effect -->
    <radialGradient id="bubbleGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1000" height="600" fill="url(#skyGrad)" />

  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="200" cy="150" r="80" />
    <circle cx="280" cy="180" r="60" />
    <circle cx="150" cy="180" r="50" />
    
    <circle cx="700" cy="100" r="100" />
    <circle cx="800" cy="130" r="70" />
    <circle cx="620" cy="130" r="60" />
  </g>

  <!-- Grass -->
  <path d="M0,450 Q500,350 1000,450 L1000,600 L0,600 Z" fill="url(#grassGrad)" />
  <path d="M0,500 Q400,400 1000,500 L1000,600 L0,600 Z" fill="#2E7D32" opacity="0.4" />

  <!-- Glass Bubbles -->
  <circle cx="100" cy="100" r="40" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5" />
  <circle cx="850" cy="350" r="120" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />
  <circle cx="900" cy="100" r="60" fill="url(#bubbleGrad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4" />

  <!-- Subtle Glow -->
  <circle cx="500" cy="300" r="300" fill="url(#bubbleGrad)" opacity="0.2" />
</svg>
